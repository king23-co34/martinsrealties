<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reviews — Martins Realties Admin</title>
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
<link rel="icon" href="../assets/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png" />
<meta name="theme-color" content="#0B2740" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { navy:'#123A57','navy-dark':'#0B2740', brass:'#B8862B','brass-light':'#D4A94F', ivory:'#F7F5F0', charcoal:'#1F2421', slate:'#5B6B79' },
    fontFamily: { display:['Fraunces','serif'], sans:['Inter','sans-serif'] },
  } } };
</script>
<link rel="stylesheet" href="../css/style.css" />
<script defer src="../js/api.js"></script>
<script defer src="../js/ui.js"></script>
<script defer src="../js/admin/reviews.js"></script>
</head>
<body class="bg-ivory text-charcoal" data-page="AdminReviews">
<div class="flex min-h-screen">
  <aside id="admin-sidebar" class="hidden lg:block w-64 bg-navy-dark flex-shrink-0"></aside>
  <div class="flex-1 min-w-0">
    <div class="lg:hidden bg-navy-dark px-5 py-4 flex items-center justify-between">
      <span class="font-display text-white">Admin Panel</span>
      <button id="mobile-admin-toggle" class="text-white p-2"><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    </div>
    <main class="p-6 lg:p-10">
      <div class="flex items-center justify-between mb-8 flex-wrap gap-3">
        <h1 class="font-display text-3xl">Reviews</h1>
        <div class="flex gap-2" id="review-filter-tabs">
          <button data-status="" class="tab-btn active bg-navy text-white text-xs font-semibold px-4 py-2 rounded-md">All</button>
          <button data-status="pending" class="tab-btn bg-white border border-black/10 text-xs font-semibold px-4 py-2 rounded-md">Pending</button>
          <button data-status="approved" class="tab-btn bg-white border border-black/10 text-xs font-semibold px-4 py-2 rounded-md">Approved</button>
        </div>
      </div>
      <div id="admin-reviews-list" class="grid sm:grid-cols-2 gap-5"></div>
    </main>
  </div>
</div>
</body>
</html>
