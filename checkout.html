<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout — Martins Realties</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
<link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#0B2740" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { navy:'#123A57','navy-dark':'#0B2740', brass:'#B8862B','brass-light':'#D4A94F', ivory:'#F7F5F0', charcoal:'#1F2421', slate:'#5B6B79' },
    fontFamily: { display:['Fraunces','serif'], sans:['Inter','sans-serif'] },
  } } };
</script>
<link rel="stylesheet" href="css/style.css" />
<script defer src="js/api.js"></script>
<script defer src="js/ui.js"></script>
<script defer src="js/checkout.js"></script>
</head>
<body class="bg-ivory text-charcoal" data-page="Cart">
<div id="site-header"></div>

<section class="max-w-5xl mx-auto px-5 py-16">
  <h1 class="font-display text-3xl mb-10">Checkout</h1>
  <div class="grid lg:grid-cols-3 gap-8">
    <form id="checkout-form" class="lg:col-span-2 bg-white rounded-2xl border border-black/5 p-7 space-y-4 h-fit">
      <h2 class="font-display text-lg mb-2">Contact &amp; delivery details</h2>
      <div>
        <label class="block text-xs text-slate mb-1.5">Contact phone number</label>
        <input name="contactPhone" required class="w-full rounded-md border border-black/10 px-3.5 py-2.5 text-sm focus:border-brass" />
      </div>
      <div>
        <label class="block text-xs text-slate mb-1.5">Contact / delivery address</label>
        <textarea name="contactAddress" required rows="3" class="w-full rounded-md border border-black/10 px-3.5 py-2.5 text-sm focus:border-brass"></textarea>
      </div>
      <div>
        <label class="block text-xs text-slate mb-1.5">Additional notes (optional)</label>
        <textarea name="notes" rows="2" class="w-full rounded-md border border-black/10 px-3.5 py-2.5 text-sm focus:border-brass"></textarea>
      </div>
      <button type="submit" class="w-full bg-brass hover:bg-brass-light text-white font-semibold py-3 rounded-md transition-colors flex items-center justify-center">
        <span class="btn-label">Place Order</span>
      </button>
      <p class="text-xs text-slate">Your order will be reviewed and confirmed by our team. Properties are marked pending until confirmation.</p>
    </form>

    <div class="bg-white rounded-2xl border border-black/5 p-6 h-fit">
      <h2 class="font-display text-lg mb-4">Order Summary</h2>
      <div id="checkout-items" class="space-y-3 mb-4"></div>
      <div class="flex justify-between font-semibold text-base border-t border-black/10 pt-3"><span>Total</span><span class="text-navy" id="checkout-total">₦0</span></div>
    </div>
  </div>
</section>

<div id="site-footer"></div>
</body>
</html>
