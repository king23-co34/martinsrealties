<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
<link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<link rel="canonical" href="https://www.martinsrealties.com.ng/contact.html" />
<meta name="theme-color" content="#0B2740" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { navy:'#123A57','navy-dark':'#0B2740', brass:'#B8862B','brass-light':'#D4A94F', ivory:'#F7F5F0', charcoal:'#1F2421', slate:'#5B6B79' },

<script defer src="js/api.js"></script>

</head>
<body class="bg-ivory text-charcoal" data-page="Contact">
<div id="site-header"></div>

<section class="bg-navy-dark py-16">
  <div class="max-w-7xl mx-auto px-5">
    <span class="text-brass-light text-xs tracked-caps">CONTACT</span>
    <h1 class="font-display text-white text-4xl mt-3">Let's talk business</h1>
  </div>
</section>

<section class="max-w-6xl mx-auto px-5 py-20 grid lg:grid-cols-2 gap-16">
  <div>
    <h2 class="font-display text-2xl mb-6">Contact information</h2>
    <ul class="space-y-5 text-sm">
      <li class="flex gap-3"><span class="text-brass">📍</span><span>No. 4, Babatope Bejide Crescent, Off Fola Osibo, Lekki Phase 1, Lagos, Nigeria.</span></li>
      <li class="flex gap-3"><span class="text-brass">📞</span><a href="tel:+2347034881125" class="hover:text-brass">+234 703 488 1125</a></li>
      <li class="flex gap-3"><span class="text-brass">✉️</span><a href="mailto:martinsds845@gmail.com" class="hover:text-brass">martinsds845@gmail.com</a></li>
      <li class="flex gap-3"><span class="text-brass">✉️</span><a href="mailto:priscamartins15@gmail.com" class="hover:text-brass">priscamartins15@gmail.com</a></li>
    </ul>
    <div class="flex gap-4 mt-8">
      <a href="https://facebook.com/martins.realties" target="_blank" rel="noopener" class="border border-black/10 hover:border-brass rounded-full p-3"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.2c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12Z"/></svg></a>
      <a href="https://instagram.com/martins_realties" target="_blank" rel="noopener" class="border border-black/10 hover:border-brass rounded-full p-3"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg></a>
    </div>
    <div class="mt-10 rounded-2xl overflow-hidden border border-black/5 h-64">
      <iframe title="D'S Martins Nig Enterprise location" class="w-full h-full" loading="lazy" src="https://www.google.com/maps?q=Lekki+Phase+1,+Lagos,+Nigeria&output=embed"></iframe>
    </div>
  </div>

  <form id="contact-form" class="bg-white rounded-2xl border border-black/5 p-8 space-y-4 h-fit">
    <div class="grid sm:grid-cols-2 gap-4">
      <input name="name" required placeholder="Full name" class="rounded-md border border-black/10 px-3.5 py-2.5 text-sm focus:border-brass" />
      <input name="email" type="email" required placeholder="Email address" class="rounded-md border border-black/10 px-3.5 py-2.5 text-sm focus:border-brass" />
    </div>
    <div class="grid sm:grid-cols-2 gap-4">
      <input name="phone" placeholder="Phone number" class="rounded-md border border-black/10 px-3.5 py-2.5 text-sm focus:border-brass" />
      <input name="subject" placeholder="Subject" class="rounded-md border border-black/10 px-3.5 py-2.5 text-sm focus:border-brass" />
    </div>
    <textarea name="message" required rows="5" placeholder="Your message" class="w-full rounded-md border border-black/10 px-3.5 py-2.5 text-sm focus:border-brass"></textarea>
    <button type="submit" class="w-full bg-navy hover:bg-navy-dark text-white font-semibold py-3.5 rounded-md transition-colors flex items-center justify-center">
      <span class="btn-label">Contact Us</span>
    </button>
  </form>
</section>

<div id="site-footer"></div>
<script>
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('contact-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const btn = form.querySelector('button[type=submit]');
    const label = btn.querySelector('.btn-label');
    btn.disabled = true; label.innerHTML = '<span class="btn-spinner"></span>';
    const payload = Object.fromEntries(new FormData(form).entries());
    try {
      await Api.submitInquiry(payload);
      toast('Message sent — we will get back to you shortly.', 'success');
      form.reset();
    } catch (err) {
      toast(apiErrorMessage(err), 'error');
    } finally {
      btn.disabled = false; label.textContent = 'Contact Us';
    }
  });
});
</script>
</body>
</html>
