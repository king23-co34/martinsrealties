<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Profile — D'S Martins Nig Enterprise</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
<link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#0B2740" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { navy:'#123A57','navy-dark':'#0B2740', brass:'#B8862B','brass-light':'#D4A94F', ivory:'#F7F5F0', charcoal:'#1F2421', slate:'#5B6B79' },
    fontFamily: { display:['Fraunces','serif'], sans:['Inter','sans-serif'] },
  } } };
</script>
<link rel="stylesheet" href="css/style.css" />
<script defer src="js/api.js"></script>
<script defer src="js/ui.js"></script>
</head>
<body class="bg-ivory text-charcoal" data-page="Profile">
<div id="site-header"></div>

<section class="max-w-4xl mx-auto px-5 py-16">
  <h1 class="font-display text-3xl mb-10">My Profile</h1>
  <div class="grid md:grid-cols-2 gap-8">
    <form id="profile-form" class="bg-white rounded-2xl border border-black/5 p-7 space-y-4">
      <h2 class="font-display text-lg mb-2">Profile details</h2>
      <div>
        <label class="block text-xs text-slate mb-1.5">Full name</label>
        <input name="name" required class="w-full rounded-md border border-black/10 px-3.5 py-2.5 text-sm focus:border-brass" />
      </div>
      <div>
        <label class="block text-xs text-slate mb-1.5">Email address</label>
        <input name="email" disabled class="w-full rounded-md border border-black/10 bg-black/5 px-3.5 py-2.5 text-sm text-slate" />
      </div>
      <div>
        <label class="block text-xs text-slate mb-1.5">Phone number</label>
        <input name="phone" class="w-full rounded-md border border-black/10 px-3.5 py-2.5 text-sm focus:border-brass" />
      </div>
      <button type="submit" class="bg-navy hover:bg-navy-dark text-white font-semibold px-6 py-2.5 rounded-md text-sm transition-colors flex items-center gap-2">
        <span class="btn-label">Save Changes</span>
      </button>
    </form>

    <form id="password-form" class="bg-white rounded-2xl border border-black/5 p-7 space-y-4">
      <h2 class="font-display text-lg mb-2">Change password</h2>
      <div>
        <label class="block text-xs text-slate mb-1.5">Current password</label>
        <input name="currentPassword" type="password" required class="w-full rounded-md border border-black/10 px-3.5 py-2.5 text-sm focus:border-brass" />
      </div>
      <div>
        <label class="block text-xs text-slate mb-1.5">New password</label>
        <input name="newPassword" type="password" required minlength="6" class="w-full rounded-md border border-black/10 px-3.5 py-2.5 text-sm focus:border-brass" />
      </div>
      <button type="submit" class="bg-navy hover:bg-navy-dark text-white font-semibold px-6 py-2.5 rounded-md text-sm transition-colors flex items-center gap-2">
        <span class="btn-label">Update Password</span>
      </button>
    </form>
  </div>

  <div class="mt-12">
    <h2 class="font-display text-2xl mb-6">My Orders</h2>
    <div id="orders-list" class="space-y-4"></div>
  </div>
</section>

<div id="site-footer"></div>
<script src="js/profile.js" defer></script>
</body>
</html>
