<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Property Details — Martins Realties</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
<link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<meta name="theme-color" content="#0B2740" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { navy:'#123A57','navy-dark':'#0B2740', brass:'#B8862B','brass-light':'#D4A94F', ivory:'#F7F5F0', charcoal:'#1F2421', slate:'#5B6B79' },

</script>
<link rel="stylesheet" href="css/style.css" />
<script defer src="js/api.js"></script>

<body class="bg-ivory text-charcoal" data-page="Properties">
<div id="site-header"></div>

<div class="max-w-7xl mx-auto px-5 py-10" id="detail-root">
  <div class="grid lg:grid-cols-3 gap-10">
    <div class="lg:col-span-2 space-y-6">
      <div class="h-96 skeleton rounded-2xl" id="gallery-main"></div>
      <div class="flex gap-3" id="gallery-thumbs"></div>

    <div class="space-y-5" id="detail-sidebar">
